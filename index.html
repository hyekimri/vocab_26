<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>수아의 영어단어장</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

  :root{
    --sky-top:#CFF3FF; --sky-bottom:#FFFFFF;
    --coral:#FF7A5C; --coral-dark:#E85F42;
    --grass:#7FC96A; --grass-dark:#5FA84C;
    --yellow:#FFC93C; --yellow-dark:#E6AC1F;
    --purple:#9B72CF; --purple-dark:#7E56B3;
    --navy:#2B3A55; --muted:#8b97ab; --white:#FFFFFF;
    --line:#E4ECF5;
    --shadow: 0 6px 0 rgba(43,58,85,0.12);
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:'Noto Sans KR', sans-serif; color:var(--navy);
    background:linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 45%);
    min-height:100vh; padding-bottom:90px;
  }
  header{text-align:center; padding:22px 16px 6px;}
  header h1{font-family:'Gaegu',cursive; font-size:32px; margin:0;}
  header p{margin:4px 0 0; font-size:13px; color:var(--muted);}

  .status-bar{
    max-width:680px; margin:10px auto 0; padding:0 16px;
    display:flex; align-items:center; justify-content:center; gap:10px;
    font-family:'Gaegu',cursive; font-size:17px;
  }
  .status-chip{
    background:var(--white); border-radius:14px; padding:6px 14px;
    box-shadow:var(--shadow); display:flex; align-items:center; gap:6px; cursor:pointer;
  }
  .chip-img{width:22px; height:auto; vertical-align:middle;}

  .tabs{display:flex; justify-content:center; gap:6px; flex-wrap:wrap; padding:14px 10px 4px;}
  .tab-btn{
    font-family:'Gaegu',cursive; font-size:15px; font-weight:700; border:none; border-radius:14px;
    padding:9px 12px; cursor:pointer; background:var(--white); color:var(--navy); box-shadow:var(--shadow);
  }
  .tab-btn.active{background:var(--coral); color:var(--white); box-shadow:0 6px 0 var(--coral-dark);}

  main{max-width:680px; margin:0 auto; padding:14px 16px;}
  .panel{background:var(--white); border-radius:22px; padding:20px; box-shadow:var(--shadow); min-height:320px;}

  /* 단어 입력 */
  .set-counter{
    text-align:center; font-family:'Gaegu',cursive; font-size:18px; margin-bottom:12px; color:var(--purple-dark);
  }
  .add-form{display:flex; flex-direction:column; gap:8px; margin-bottom:16px; padding:14px; background:#F7FAFD; border-radius:16px;}
  .add-row{display:flex; gap:8px; flex-wrap:wrap;}
  .add-form input, .add-form textarea{
    flex:1; min-width:110px; font-family:'Noto Sans KR'; font-size:15px; padding:10px 12px;
    border:2px solid var(--line); border-radius:12px; outline:none; resize:none;
  }
  .add-form input:focus, .add-form textarea:focus{border-color:var(--coral);}
  .add-form button{
    font-family:'Gaegu',cursive; font-size:17px; font-weight:700; background:var(--grass); color:var(--white);
    border:none; border-radius:12px; padding:0 18px; box-shadow:0 4px 0 var(--grass-dark); cursor:pointer; align-self:flex-start;
  }
  .add-form button:disabled{background:#C9D3E0; box-shadow:none; cursor:not-allowed;}
  .hint-small{font-size:12px; color:var(--muted);}

  .word-list{list-style:none; margin:0; padding:0;}
  .word-card{padding:12px 8px; border-bottom:1px dashed var(--line);}
  .wr-top{display:flex; align-items:center; gap:8px;}
  .wr-top .en{font-weight:700; min-width:70px;}
  .wr-top .ko{color:var(--muted); flex:1;}
  .wr-ex{margin-top:6px; font-size:13px; color:var(--navy); padding-left:38px;}
  .wr-date{margin-top:3px; font-size:11px; color:var(--muted); padding-left:38px;}
  .hl-word{font-weight:800;}
  .spk-btn{
    background:var(--purple); color:var(--white); border:none; border-radius:10px; width:30px; height:30px;
    cursor:pointer; font-size:14px; flex-shrink:0;
  }
  .icon-btn{background:none; border:none; cursor:pointer; font-size:15px; color:#9AA6B8;}
  .icon-btn:hover{color:var(--navy);}
  .newset-btn{
    margin-top:14px; width:100%; font-family:'Gaegu',cursive; font-size:16px; font-weight:700;
    background:var(--yellow); color:var(--navy); border:none; border-radius:12px; padding:12px; box-shadow:0 4px 0 var(--yellow-dark); cursor:pointer;
  }
  .empty-msg, .need-more{text-align:center; color:var(--muted); padding:40px 10px; font-family:'Gaegu',cursive; font-size:18px; line-height:1.6;}

  .vocab-date-title{font-family:'Gaegu',cursive; font-size:18px; margin-bottom:12px; color:var(--purple-dark);}
  .vocab-date-list{list-style:none; margin:0; padding:0;}
  .vocab-date-row{
    display:flex; align-items:center; gap:10px; padding:13px 8px; border-bottom:1px dashed var(--line); cursor:pointer;
  }
  .vocab-date-row:hover{background:#F7FAFD;}
  .vocab-date{font-family:'Gaegu',cursive; font-weight:700; color:var(--navy); min-width:92px;}
  .vocab-preview{color:var(--muted); flex:1; font-size:14px;}
  .vocab-count{font-size:12px; color:var(--purple-dark); background:#F5EFFC; border-radius:10px; padding:2px 8px;}
  .vocab-arrow{color:var(--muted); font-size:18px;}
  .back-btn{font-family:'Gaegu',cursive; font-size:14px; font-weight:700; margin-bottom:10px;}

  .edit-card{background:#F7FAFD; border-radius:14px; padding:12px; display:flex; flex-direction:column; gap:8px;}
  .edit-card input, .edit-card textarea{
    font-family:'Noto Sans KR'; font-size:14px; padding:9px 10px; border:2px solid var(--line); border-radius:10px; resize:none;
  }
  .edit-actions{display:flex; gap:8px;}
  .edit-actions button{font-family:'Gaegu',cursive; font-weight:700; font-size:14px; border:none; border-radius:10px; padding:8px 14px; cursor:pointer;}
  .save-btn{background:var(--grass); color:var(--white);}
  .cancel-btn{background:#E4ECF5; color:var(--navy);}

  /* 플래시카드 */
  .flash-wrap{display:flex; flex-direction:column; align-items:center; gap:14px;}
  .flash-card{width:100%; max-width:340px; height:210px; perspective:1000px; cursor:pointer;}
  .flash-inner{position:relative; width:100%; height:100%; transition:transform .5s; transform-style:preserve-3d;}
  .flash-card.flipped .flash-inner{transform:rotateY(180deg);}
  .flash-face{
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    border-radius:20px; backface-visibility:hidden; text-align:center; padding:14px; gap:8px;
  }
  .flash-front{background:linear-gradient(160deg,#FFE9DE,var(--coral)); color:var(--white);}
  .flash-back{background:linear-gradient(160deg,#EFE3FA,var(--purple)); color:var(--white); transform:rotateY(180deg);}
  .flash-word{font-family:'Noto Sans KR', sans-serif; font-size:38px; font-weight:900; letter-spacing:0.3px;}
  .flash-example{font-family:'Noto Sans KR'; font-size:13.5px; font-weight:400; opacity:.95; padding:0 6px;}
  .flash-hint{font-size:12px; color:var(--muted);}
  .flash-actions{display:flex; gap:10px;}
  .know-btn, .dontknow-btn{
    font-family:'Gaegu',cursive; font-size:17px; font-weight:700; border:none; border-radius:14px; padding:11px 18px; cursor:pointer; color:var(--white);
  }
  .know-btn{background:var(--grass); box-shadow:0 4px 0 var(--grass-dark);}
  .dontknow-btn{background:#B8C2D1; box-shadow:0 4px 0 #96A2B5;}
  .sound-row{display:flex; gap:8px;}
  .sound-btn{
    background:var(--white); border:2px solid var(--line); border-radius:12px; padding:7px 12px; font-size:13px; cursor:pointer; color:var(--navy);
  }
  .progress-text{font-size:13px; color:var(--muted);}

  /* 퀴즈 */
  .quiz-word-row{display:flex; align-items:center; justify-content:center; gap:10px; margin:6px 0 6px;}
  .quiz-word{font-family:'Noto Sans KR', sans-serif; font-size:36px; font-weight:900; letter-spacing:0.3px;}
  .quiz-example{text-align:center; font-size:13px; color:var(--muted); margin-bottom:10px;}
  .quiz-tries{text-align:center; font-size:12px; color:var(--purple-dark); margin-bottom:10px; min-height:16px;}
  .quiz-options{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .quiz-opt{
    font-family:'Noto Sans KR'; font-size:16px; font-weight:500; border:2px solid var(--line); border-radius:14px;
    background:var(--white); padding:14px 8px; cursor:pointer;
  }
  .quiz-opt.correct{background:var(--grass); border-color:var(--grass-dark); color:var(--white);}
  .quiz-opt.wrong{background:var(--coral); border-color:var(--coral-dark); color:var(--white);}
  .quiz-opt.disabled-wrong{opacity:.4; text-decoration:line-through;}
  .quiz-score{text-align:center; color:var(--muted); font-size:13px; margin-bottom:4px;}

  /* 매칭게임 */
  .match-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:8px;}
  .match-card{
    aspect-ratio:1/1; display:flex; align-items:center; justify-content:center; text-align:center; border-radius:12px;
    font-weight:700; font-size:13px; padding:4px; background:#EFF4FA; border:2px solid var(--line); cursor:pointer; color:var(--navy);
  }
  .match-card.selected{border-color:var(--purple); background:#EFE3FA;}
  .match-card.matched{background:var(--grass); border-color:var(--grass-dark); color:var(--white); cursor:default;}
  .match-card.shake{background:var(--coral); border-color:var(--coral-dark); color:var(--white);}

  /* 스펠잇 */
  .spell-meta{text-align:center; color:var(--muted); font-size:13px; margin-bottom:2px;}
  .spell-ko{text-align:center; font-family:'Gaegu',cursive; font-size:20px; margin:6px 0 4px;}
  .spell-word-row{display:flex; gap:6px; justify-content:center; flex-wrap:wrap; margin:16px 0;}
  .spell-blank{
    width:32px; height:40px; border-bottom:3px solid var(--purple); display:flex; align-items:center; justify-content:center;
    font-size:19px; font-weight:700; cursor:pointer; color:var(--navy);
  }
  .spell-blank.hint{color:var(--yellow-dark);}
  .spell-blank.reveal-wrong{color:var(--coral-dark); border-color:var(--coral);}
  .spell-tiles{display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-top:6px;}
  .spell-tile{
    width:36px; height:36px; border-radius:10px; background:var(--white); border:2px solid var(--line);
    font-weight:700; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .spell-tile.used{visibility:hidden;}
  .spell-actions{display:flex; gap:10px; justify-content:center; margin-top:18px; flex-wrap:wrap;}
  .hint-btn{
    background:var(--yellow); color:var(--navy); border:none; border-radius:12px; padding:9px 16px;
    font-family:'Gaegu',cursive; font-weight:700; font-size:14px; cursor:pointer; box-shadow:0 4px 0 var(--yellow-dark);
  }
  .hint-btn:disabled{background:#E4ECF5; color:var(--muted); box-shadow:none; cursor:not-allowed;}
  .spell-complete{text-align:center; font-family:'Gaegu',cursive; font-size:20px; padding:30px 10px;}

  /* 파이널테스트 */
  .ft-intro{text-align:center; color:var(--muted); font-size:13px; margin-bottom:10px;}
  .ft-row{display:flex; align-items:center; gap:8px; padding:10px 2px; border-bottom:1px dashed var(--line); flex-wrap:wrap;}
  .ft-num{font-family:'Gaegu',cursive; font-weight:700; color:var(--muted); width:20px; flex-shrink:0;}
  .ft-en{font-weight:700; min-width:76px;}
  .ft-spk{display:flex; gap:4px;}
  .ft-spk button{background:var(--purple); color:#fff; border:none; border-radius:8px; width:26px; height:26px; font-size:11px; cursor:pointer;}
  .ft-input{flex:1; min-width:100px; padding:8px 10px; border:2px solid var(--line); border-radius:10px; font-size:14px; font-family:'Noto Sans KR';}
  .ft-input.correct{border-color:var(--grass); background:#F1FAF0;}
  .ft-input.wrong{border-color:var(--coral); background:#FFF2EE;}
  .ft-input:disabled{background:#F7FAFD; color:var(--muted);}
  .ft-answer{font-size:11.5px; color:var(--coral-dark); width:100%; padding-left:104px;}
  .ft-check-btn{
    width:100%; margin-top:16px; font-family:'Gaegu',cursive; font-size:17px; font-weight:700;
    background:var(--coral); color:var(--white); border:none; border-radius:14px; padding:13px; cursor:pointer; box-shadow:0 4px 0 var(--coral-dark);
  }
  .ft-result{text-align:center; font-family:'Gaegu',cursive; font-size:18px; margin-top:14px;}
  .ft-retry-btn{
    display:block; margin:14px auto 0; font-family:'Gaegu',cursive; font-size:15px; font-weight:700;
    background:var(--purple); color:#fff; border:none; border-radius:12px; padding:10px 20px; cursor:pointer; box-shadow:0 4px 0 var(--purple-dark);
  }

  .star-note{
    margin-top:16px; text-align:center; font-size:12px; color:var(--navy); background:#FFF8E9; border-radius:10px; padding:9px 10px; line-height:1.5;
  }

  /* 보상 */
  .char-hero{text-align:center; padding:16px 0 10px;}
  .char-hero .hero-img{width:150px; height:auto; display:block; margin:0 auto; filter:drop-shadow(0 8px 10px rgba(43,58,85,0.18)); object-fit:contain;}
  .char-hero .stage-name{font-family:'Gaegu',cursive; font-size:20px; margin-top:6px;}
  .grow-note{text-align:center; font-size:12px; color:var(--muted); margin:4px 0 2px;}
  .star-bar-wrap{max-width:320px; margin:14px auto; }
  .star-count{text-align:center; font-family:'Gaegu',cursive; font-size:16px; margin-bottom:6px;}
  .star-bar-bg{background:var(--line); border-radius:20px; height:16px; overflow:hidden;}
  .star-bar-fill{background:linear-gradient(90deg,var(--yellow),#FFA53C); height:100%; border-radius:20px; transition:width .4s;}
  .star-next{text-align:center; font-size:12px; color:var(--muted); margin-top:6px;}
  .roster-title{font-family:'Gaegu',cursive; font-size:16px; margin:20px 2px 10px; color:var(--navy);}
  .roster-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px;}
  .roster-card{border-radius:14px; padding:10px 6px; text-align:center; border:2px solid var(--line); background:var(--white);}
  .roster-card .roster-img{width:54px; height:auto; display:block; margin:0 auto;}
  .roster-card .roster-name{font-family:'Gaegu',cursive; font-size:12.5px; margin-top:3px; line-height:1.2;}
  .roster-card .roster-badge{font-size:10px; color:var(--muted); margin-top:2px;}
  .roster-card.done{color:var(--white); border-color:transparent;}
  .roster-card.done .roster-badge{color:rgba(255,255,255,.85);}
  .roster-card.current{border-color:var(--purple); background:#F5EFFC; box-shadow:0 0 0 3px rgba(155,114,207,.15);}
  .roster-card.locked{background:#F2F4F7; opacity:.8;}
  .roster-card.locked .roster-img.silhouette{filter:brightness(0) opacity(0.35);}
  .reset-star-btn{margin-top:22px; background:var(--coral); box-shadow:0 4px 0 var(--coral-dark);}
</style>
</head>
<body>

<header>
  <h1>🎧 수아의 영어단어장</h1>
  <p>이번 학원 단어, 재미있게 외워봐요</p>
</header>

<div class="status-bar"><div class="status-chip" id="statusChip"></div></div>

<div class="tabs">
  <button class="tab-btn active" data-tab="list">✏️ 단어 입력</button>
  <button class="tab-btn" data-tab="vocab">📚 단어장</button>
  <button class="tab-btn" data-tab="flash">🃏 플래시카드</button>
  <button class="tab-btn" data-tab="quiz">❓ 퀴즈</button>
  <button class="tab-btn" data-tab="match">🧩 매칭게임</button>
  <button class="tab-btn" data-tab="spell">🔤 스펠잇</button>
  <button class="tab-btn" data-tab="final">📝 파이널테스트</button>
  <button class="tab-btn" data-tab="reward">🐉 캐릭터 키우기</button>
</div>

<main><div class="panel" id="panel"></div></main>
<p style="max-width:680px;margin:14px auto 0;padding:0 20px;text-align:center;font-size:11px;color:var(--muted);">
  입력한 단어와 진행 상황은 이 기기의 브라우저에 저장돼요. 발음 기능은 기기의 음성 기능을 사용해요 (아이폰 Safari는 소리 버튼을 먼저 한 번 눌러주세요).
</p>

<script>
const WORDS_KEY = 'voca-buddy-words-v1';
const REWARD_KEY = 'voca-buddy-reward-v2';
const SETPROG_KEY = 'voca-buddy-setprogress-v1';
const ARCHIVE_KEY = 'voca-buddy-archive-v1';
const MAX_WORDS = 10;

let words = [];
let archive = [];
let selectedArchiveDate = null;
let editingId = null;
let activeTab = 'list';
let reward = { stars:0, spellItEverCompleted:false, finalTestEverCompleted:false };
let setProgress = { flashCorrect:0, flashStars:0, quizCorrect:0, quizStars:0, matchWins:0, matchStars:0 };

const STAGE_LABELS = ['알','부화','갓 태어남','아기','유년기','소년기','청소년기','청년기','성체','다 자람'];
const STAGE_COUNT = STAGE_LABELS.length;
const STARS_PER_STAGE = 15;
const STARS_PER_ANIMAL = STARS_PER_STAGE * (STAGE_COUNT - 1);
const SET_STAR_CAP = 3;
const SUCCESS_PER_STAR = 10;

function hexToRgb(hex){
  hex = hex.replace('#','');
  return { r: parseInt(hex.substring(0,2),16), g: parseInt(hex.substring(2,4),16), b: parseInt(hex.substring(4,6),16) };
}
function lerpColor(hexA, hexB, t){
  const a = hexToRgb(hexA), b = hexToRgb(hexB);
  const r = Math.round(a.r + (b.r-a.r)*t);
  const g = Math.round(a.g + (b.g-a.g)*t);
  const bl = Math.round(a.b + (b.b-a.b)*t);
  return 'rgb('+r+','+g+','+bl+')';
}
function stageBgGradient(animal, stage){
  const t = stage/(STAGE_COUNT-1);
  const base = lerpColor(animal.bgFrom, animal.bgTo, t);
  const light = lerpColor(base, '#FFFFFF', 0.55);
  return 'linear-gradient(160deg, '+light+', '+base+')';
}

// ---------- storage ----------
async function loadAll(){
  try{ const raw = localStorage.getItem(WORDS_KEY); words = raw ? JSON.parse(raw) : []; }catch(e){ words = []; }
  try{ const raw = localStorage.getItem(REWARD_KEY); reward = raw ? Object.assign({stars:0,spellItEverCompleted:false,finalTestEverCompleted:false}, JSON.parse(raw)) : {stars:0,spellItEverCompleted:false,finalTestEverCompleted:false}; }catch(e){ reward = {stars:0,spellItEverCompleted:false,finalTestEverCompleted:false}; }
  try{ const raw = localStorage.getItem(SETPROG_KEY); setProgress = raw ? JSON.parse(raw) : {flashCorrect:0,flashStars:0,quizCorrect:0,quizStars:0,matchWins:0,matchStars:0}; }catch(e){ setProgress = {flashCorrect:0,flashStars:0,quizCorrect:0,quizStars:0,matchWins:0,matchStars:0}; }
  try{ const raw = localStorage.getItem(ARCHIVE_KEY); archive = raw ? JSON.parse(raw) : []; }catch(e){ archive = []; }
}

function uid(){ return 'w' + Date.now() + Math.floor(Math.random()*1000); }
function todayStr(){
  const d = new Date();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return d.getFullYear()+'-'+m+'-'+day;
}

// ---------- speech ----------
function speak(text, rate){
  if(!text || !('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = rate || 0.95;
  window.speechSynthesis.speak(u);
}

// ---------- sound effects ----------
let audioCtx = null;
function getCtx(){ if(!audioCtx){ try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return null; } } return audioCtx; }
function playTone(freq, start, dur, type, vol){
  const ctx = getCtx(); if(!ctx) return;
  const o = ctx.createOscillator(); const g = ctx.createGain();
  o.type = type||'sine'; o.frequency.value = freq;
  o.connect(g); g.connect(ctx.destination);
  const t0 = ctx.currentTime + start;
  g.gain.setValueAtTime(vol||0.2, t0);
  g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
  o.start(t0); o.stop(t0+dur);
}
function playBuzz(){ playTone(190,0,0.3,'sawtooth',0.15); }
function playDing(){ playTone(659,0,0.13,'sine',0.22); playTone(880,0.13,0.24,'sine',0.22); }

function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s){ return escapeHtml(s).replace(/"/g,'&quot;'); }
function escapeRegex(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
function highlightExample(ex, en){
  if(!ex) return '';
  const escaped = escapeHtml(ex);
  const escEn = escapeRegex(escapeHtml(en));
  const re = new RegExp('\\b('+escEn+')\\b','i');
  return escaped.replace(re, '<span class="hl-word">$1</span>');
}
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function needMore(msg){ return '<div class="need-more">'+msg+'</div>'; }

// ---------- 진행 상황 / 별 ----------
function getAnimalIndex(stars){ return Math.min(ANIMALS.length-1, Math.floor(stars / STARS_PER_ANIMAL)); }
function getStarsIntoCurrentAnimal(stars){
  const idx = getAnimalIndex(stars);
  return Math.min(STARS_PER_ANIMAL, stars - idx*STARS_PER_ANIMAL);
}
function getStageIndex(starsIntoAnimal){
  return Math.min(STAGE_COUNT-1, Math.floor(starsIntoAnimal / STARS_PER_STAGE));
}
async function grantStars(n){
  reward.stars += n;
  await saveReward();
  renderStatusChip();
}
function renderStatusChip(){
  const chip = document.getElementById('statusChip');
  const animalIdx = getAnimalIndex(reward.stars);
  const starsIn = getStarsIntoCurrentAnimal(reward.stars);
  const stage = getStageIndex(starsIn);
  const animal = ANIMALS[animalIdx];
  chip.innerHTML = '<img src="'+animal.images[stage]+'" class="chip-img" alt=""> <span>⭐ ' + reward.stars + '</span>';
  chip.onclick = ()=>{ document.querySelector('.tab-btn[data-tab="reward"]').click(); };
}

// 세트당 최대 3개 별, 10회 성공마다 1개
async function registerSuccess(kind){
  if(kind==='flash'){
    setProgress.flashCorrect++;
    if(setProgress.flashStars < SET_STAR_CAP && setProgress.flashCorrect % SUCCESS_PER_STAR === 0){
      setProgress.flashStars++; await grantStars(1);
    }
  }else if(kind==='quiz'){
    setProgress.quizCorrect++;
    if(setProgress.quizStars < SET_STAR_CAP && setProgress.quizCorrect % SUCCESS_PER_STAR === 0){
      setProgress.quizStars++; await grantStars(1);
    }
  }else if(kind==='match'){
    setProgress.matchWins++;
    if(setProgress.matchStars < SET_STAR_CAP){
      setProgress.matchStars++; await grantStars(1);
    }
  }
  await saveSetProgress();
}

// ---------- tabs ----------
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeTab = btn.dataset.tab;
    render();
  });
});

function render(){
  const panel = document.getElementById('panel');
  panel.innerHTML = '';
  if(activeTab==='list') renderList(panel);
  if(activeTab==='vocab') renderVocabBook(panel);
  if(activeTab==='flash') renderFlash(panel);
  if(activeTab==='quiz') renderQuiz(panel);
  if(activeTab==='match') renderMatch(panel);
  if(activeTab==='spell') renderSpell(panel);
  if(activeTab==='final') renderFinal(panel);
  if(activeTab==='reward') renderReward(panel);
  renderStatusChip();
}

    '<div class="add-form">'+

        '<input id="koInput" placeholder="뜻 (예: 코끼리)" '+(full?'disabled':'')+'/>'+

      '<button id="addBtn" '+(full?'disabled':'')+'>단어 추가</button>'+
      '<div class="hint-small">'+(full ? '이번 세트가 다 찼어요! 학원 다녀온 뒤 새 단어로 다시 채워보세요.' : '학원에서 배운 단어를 하나씩 입력해요 (최대 '+MAX_WORDS+'개)')+'</div>'+

  if(words.length===0){
    listEl.innerHTML = '<li class="empty-msg">아직 등록된 단어가 없어요 ✏️<br>위에서 첫 단어를 추가해보세요!</li>';
  }else{
    words.forEach(w=>{
      const li = document.createElement('li');
      li.className = 'word-card';
      if(editingId===w.id){
        li.innerHTML =
          '<div class="edit-card">'+
            '<input class="edit-en" value="'+escapeAttr(w.en)+'" placeholder="영어 단어"/>'+
            '<input class="edit-ko" value="'+escapeAttr(w.ko)+'" placeholder="뜻"/>'+
            '<textarea class="edit-ex" rows="2" placeholder="예문">'+escapeHtml(w.ex||'')+'</textarea>'+
            '<div class="edit-actions">'+
              '<button class="save-btn" data-id="'+w.id+'">저장</button>'+
              '<button class="cancel-btn">취소</button>'+
            '</div>'+
          '</div>';
      }else{
        li.innerHTML =
          '<div class="wr-top">'+
            '<button class="spk-btn" data-en="'+escapeAttr(w.en)+'">🔊</button>'+
            '<span class="en">'+escapeHtml(w.en)+'</span>'+
            '<span class="ko">'+escapeHtml(w.ko)+'</span>'+
            '<button class="icon-btn edit-btn" data-id="'+w.id+'">✏️</button>'+
            '<button class="icon-btn del-btn" data-id="'+w.id+'">✕</button>'+

          '<div class="wr-date">'+escapeHtml(w.date||'')+'</div>'+
          (w.ex ? '<div class="wr-ex">'+highlightExample(w.ex, w.en)+'</div>' : '');
      }
      listEl.appendChild(li);
    });
  }

  const addBtn = panel.querySelector('#addBtn');
  if(addBtn) addBtn.addEventListener('click', addWord);
  panel.querySelectorAll('.spk-btn').forEach(b=> b.addEventListener('click', ()=> speak(b.dataset.en)));
  panel.querySelectorAll('.del-btn').forEach(b=>{
    b.addEventListener('click', async ()=>{
      words = words.filter(w=>w.id!==b.dataset.id);
      archive = archive.filter(a=>a.id!==b.dataset.id);
      await saveWords();
      await saveArchive();
      render();
    });
  });
  panel.querySelectorAll('.edit-btn').forEach(b=>{
    b.addEventListener('click', ()=>{ editingId = b.dataset.id; render(); });
  });
  panel.querySelectorAll('.cancel-btn').forEach(b=>{
    b.addEventListener('click', ()=>{ editingId = null; render(); });
  });
  panel.querySelectorAll('.save-btn').forEach(b=>{
    b.addEventListener('click', async ()=>{
      const card = b.closest('.edit-card');
      const en = card.querySelector('.edit-en').value.trim();
      const ko = card.querySelector('.edit-ko').value.trim();
      const ex = card.querySelector('.edit-ex').value.trim();
      if(!en || !ko) return;
      const w = words.find(x=>x.id===b.dataset.id);
      if(w){ w.en=en; w.ko=ko; w.ex=ex; }
      const a = archive.find(x=>x.id===b.dataset.id);

      setTimeout(()=>{ confirmingReset=false; if(document.body.contains(newSetBtn)) newSetBtn.textContent = '🔄 이번 세트 지우고 새로 시작하기'; }, 2500);
      return;
    }

    setProgress = {flashCorrect:0,flashStars:0,quizCorrect:0,quizStars:0,matchWins:0,matchStars:0};
    await saveWords();
    await saveSetProgress();
    render();
  });
}

async function addWord(){
  if(words.length >= MAX_WORDS) return;
  const en = document.getElementById('enInput').value.trim();
  const ko = document.getElementById('koInput').value.trim();
  const ex = document.getElementById('exInput').value.trim();
  if(!en || !ko) return;
  const newWord = {id:uid(), en, ko, ex, date:todayStr()};
  words.push(newWord);
  archive.push(Object.assign({}, newWord));
  await saveWords();
  await saveArchive();
  render();
  const enField = document.getElementById('enInput');
  if(enField) enField.focus();
}

async function flashAnswer(knew){
  if(knew){ await registerSuccess('flash'); }
  flashIdx++;
  render();
}

// ---------- 퀴즈 ----------
let quizWordId = null, quizAttempts = 0, quizWrongPicked = [], quizScore = {correct:0, total:0};
function renderQuiz(panel){
  if(words.length < 4){ panel.innerHTML = needMore('퀴즈를 하려면 단어가 4개 이상 필요해요! ❓'); return; }
  if(!quizWordId || !words.find(w=>w.id===quizWordId)) pickQuizWord();
  const word = words.find(w=>w.id===quizWordId);
  const options = buildQuizOptions(word);
  panel.innerHTML =
    '<div class="quiz-score">맞은 개수: '+quizScore.correct+' / '+quizScore.total+'</div>'+
    '<div class="quiz-word-row"><div class="quiz-word">'+escapeHtml(word.en)+'</div><button class="spk-btn" id="quizSpk">🔊</button></div>'+
    (word.ex ? '<div class="quiz-example">'+highlightExample(word.ex, word.en)+'</div>' : '')+
    '<div class="quiz-tries" id="quizTries">'+(quizAttempts>0 ? '아쉬워요! 한 번 더 골라보세요 (마지막 기회)' : '')+'</div>'+
    '<div class="quiz-options" id="quizOptions">'+
      options.map(o=>'<button class="quiz-opt'+(quizWrongPicked.includes(o)?' disabled-wrong':'')+'" data-ko="'+escapeAttr(o)+'" '+(quizWrongPicked.includes(o)?'disabled':'')+'>'+escapeHtml(o)+'</button>').join('')+
    '</div>'+
    '<div class="star-note">정답을 '+SUCCESS_PER_STAR+'번 맞힐 때마다 ⭐1개 (이번 세트당 최대 '+SET_STAR_CAP+'개, 새 세트 시작하면 초기화돼요)</div>';
  panel.querySelector('#quizSpk').addEventListener('click', ()=> speak(word.en));
  panel.querySelectorAll('.quiz-opt').forEach(btn=> btn.addEventListener('click', ()=> quizAnswer(btn, word)));
}
function pickQuizWord(){ const pool = words.map(w=>w.id); quizWordId = pool[Math.floor(Math.random()*pool.length)]; quizAttempts=0; quizWrongPicked=[]; }
function buildQuizOptions(word){
  const others = words.filter(w=>w.id!==word.id).map(w=>w.ko);
  const distractors = shuffle(others).slice(0,3);
  return shuffle([word.ko, ...distractors]);
}
async function quizAnswer(btn, word){
  const chosen = btn.dataset.ko;
  const isCorrect = chosen === word.ko;
  if(isCorrect){
    playDing();
    quizScore.total++; quizScore.correct++;
    await registerSuccess('quiz');
    document.querySelectorAll('.quiz-opt').forEach(b=>{ b.disabled=true; if(b.dataset.ko===word.ko) b.classList.add('correct'); });
    setTimeout(()=>{ pickQuizWord(); render(); }, 850);
  }else{
    quizAttempts++;
    playBuzz();
    btn.classList.add('wrong');
    if(quizAttempts>=2){
      quizScore.total++;
      document.querySelectorAll('.quiz-opt').forEach(b=>{ b.disabled=true; if(b.dataset.ko===word.ko) b.classList.add('correct'); });
      setTimeout(()=>{ pickQuizWord(); render(); }, 1300);
    }else{
      quizWrongPicked.push(chosen);
      setTimeout(()=>{ render(); }, 700);
    }
  }
}

// ---------- 매칭게임 ----------
let matchCards = [], matchSelected = [], matchLock = false;
function renderMatch(panel){
  if(words.length < 3){ panel.innerHTML = needMore('매칭게임을 하려면 단어가 3개 이상 필요해요! 🧩'); return; }
  if(matchCards.length===0) setupMatchGame();
  panel.innerHTML = '<div class="match-grid" id="matchGrid"></div><div class="star-note">한 판을 다 맞추면 ⭐1개 (이번 세트당 최대 '+SET_STAR_CAP+'개, 새 세트 시작하면 초기화돼요)</div>';
  const grid = panel.querySelector('#matchGrid');
  matchCards.forEach((c, idx)=>{
    const el = document.createElement('div');
    el.className = 'match-card' + (c.matched ? ' matched' : '');
    el.textContent = c.text;
    if(!c.matched) el.addEventListener('click', ()=> matchClick(idx));
    grid.appendChild(el);
  });
}
function setupMatchGame(){
  const chosen = shuffle(words.slice());
  const cards = [];
  chosen.forEach(w=>{ cards.push({wordId:w.id, text:w.en, matched:false}); cards.push({wordId:w.id, text:w.ko, matched:false}); });
  matchCards = shuffle(cards); matchSelected = []; matchLock = false;
}
function matchClick(idx){
  if(matchLock) return;
  const card = matchCards[idx];
  if(card.matched || matchSelected.includes(idx)) return;
  matchSelected.push(idx);
  const els = document.querySelectorAll('.match-card');
  els[idx].classList.add('selected');
  if(matchSelected.length===2){
    matchLock = true;
    const [i1,i2] = matchSelected;
    const c1 = matchCards[i1], c2 = matchCards[i2];
    if(c1.wordId===c2.wordId){
      setTimeout(async ()=>{
        c1.matched=true; c2.matched=true;
        matchSelected = []; matchLock = false;
        const allMatched = matchCards.every(c=>c.matched);
        render();
        if(allMatched){
          playDing();
          await registerSuccess('match');
          setTimeout(()=>{ matchCards=[]; render(); }, 900);
        }
      }, 350);
    }else{
      playBuzz();
      els[i1].classList.add('shake'); els[i2].classList.add('shake');
      setTimeout(()=>{
        els[i1].classList.remove('selected','shake'); els[i2].classList.remove('selected','shake');
        matchSelected = []; matchLock = false;
      }, 600);
    }
  }
}

// ---------- 스펠잇 ----------
let spellOrder = [], spellIdx = 0, spellBlanks = [], spellTiles = [], spellHints = 0, spellLock = false;
function setupSpellRound(){
  spellOrder = shuffle(words.map(w=>w.id));
  spellIdx = 0;
  setupSpellWord();
}
function setupSpellWord(){
  const word = words.find(w=>w.id===spellOrder[spellIdx]);
  const letters = word.en.split('');
  spellBlanks = letters.map(()=>null);
  spellTiles = shuffle(letters.map((ch,i)=>({ch, used:false})));
  spellHints = 0;
  spellLock = false;
  setTimeout(()=> speak(word.en, 0.9), 200);
}
function renderSpell(panel){
  if(words.length < 3){ panel.innerHTML = needMore('스펠잇을 하려면 단어가 3개 이상 필요해요! 🔤'); return; }
  if(spellOrder.length===0) setupSpellRound();
  if(spellIdx >= spellOrder.length){
    panel.innerHTML =
      '<div class="spell-complete">🎉 이번 세트 단어를 모두 완성했어요!</div>'+
      '<button class="newset-btn" id="spellAgainBtn">🔄 다시 도전하기</button>'+
      '<div class="star-note">전체 단어를 다 성공하면 ⭐3개 (처음 한 번만) / 이후엔 성공할 때마다 ⭐1개</div>';
    panel.querySelector('#spellAgainBtn').addEventListener('click', async ()=>{
      let earned = 3;
      if(reward.spellItEverCompleted) earned = 1; else { reward.spellItEverCompleted = true; }
      await grantStars(earned);
      await saveReward();
      spellOrder = [];
      render();
    });
    return;
  }
  const word = words.find(w=>w.id===spellOrder[spellIdx]);
  panel.innerHTML =
    '<div class="spell-meta">'+(spellIdx+1)+' / '+spellOrder.length+'</div>'+
    '<div class="sound-row" style="justify-content:center;">'+
      '<button class="sound-btn" id="spSpk">🔊 다시 듣기</button>'+
      '<button class="sound-btn" id="spSpkSlow">🐢 천천히</button>'+
    '</div>'+
    '<div class="spell-ko">뜻: '+escapeHtml(word.ko)+'</div>'+
    '<div class="spell-word-row" id="spellBlanksRow"></div>'+
    '<div class="spell-tiles" id="spellTilesRow"></div>'+
    '<div class="spell-actions">'+
      '<button class="hint-btn" id="hintBtn" '+(spellHints>=2?'disabled':'')+'>💡 힌트 ('+(2-spellHints)+'번 남음)</button>'+
    '</div>'+
    '<div class="star-note">전체 단어를 다 성공하면 ⭐3개 (처음 한 번만) / 이후엔 성공할 때마다 ⭐1개</div>';

  const blanksRow = panel.querySelector('#spellBlanksRow');
  spellBlanks.forEach((b, i)=>{
    const d = document.createElement('div');
    d.className = 'spell-blank' + (b && b.source==='hint' ? ' hint' : '');
    d.textContent = b ? b.ch : '';
    if(b && b.source==='tile'){
      d.addEventListener('click', ()=>{ if(spellLock) return; returnTile(i); });
    }
    blanksRow.appendChild(d);
  });
  const tilesRow = panel.querySelector('#spellTilesRow');
  spellTiles.forEach((t, i)=>{
    const b = document.createElement('button');
    b.className = 'spell-tile' + (t.used ? ' used' : '');
    b.textContent = t.ch;
    b.disabled = t.used || spellLock;
    b.addEventListener('click', ()=> placeTile(i));
    tilesRow.appendChild(b);
  });
  panel.querySelector('#spSpk').addEventListener('click', ()=> speak(word.en, 0.95));
  panel.querySelector('#spSpkSlow').addEventListener('click', ()=> speak(word.en, 0.6));
  const hintBtn = panel.querySelector('#hintBtn');
  hintBtn.addEventListener('click', useHint);
}
function placeTile(tileIdx){
  if(spellLock) return;
  const tile = spellTiles[tileIdx];
  if(tile.used) return;
  const emptyIdx = spellBlanks.findIndex(b=>b===null);
  if(emptyIdx===-1) return;
  spellBlanks[emptyIdx] = {ch:tile.ch, source:'tile', tileIdx};
  tile.used = true;
  checkSpellComplete();
  render();
}
function returnTile(blankIdx){
  const b = spellBlanks[blankIdx];
  if(!b || b.source!=='tile') return;
  spellTiles[b.tileIdx].used = false;
  spellBlanks[blankIdx] = null;
  render();
}
function useHint(){
  if(spellHints>=2 || spellLock) return;
  const emptyIdxs = spellBlanks.map((b,i)=>b===null?i:-1).filter(i=>i>=0);
  if(emptyIdxs.length===0) return;
  const word = words.find(w=>w.id===spellOrder[spellIdx]);
  const pickIdx = emptyIdxs[Math.floor(Math.random()*emptyIdxs.length)];
  const letter = word.en[pickIdx];
  spellBlanks[pickIdx] = {ch:letter, source:'hint'};
  const matchTile = spellTiles.find(t=>!t.used && t.ch.toLowerCase()===letter.toLowerCase());
  if(matchTile) matchTile.used = true;
  spellHints++;
  checkSpellComplete();
  render();
}
function checkSpellComplete(){
  if(spellBlanks.some(b=>b===null)) return;
  const word = words.find(w=>w.id===spellOrder[spellIdx]);
  const attempt = spellBlanks.map(b=>b.ch).join('');
  spellLock = true;
  if(attempt.toLowerCase() === word.en.toLowerCase()){
    playDing();
    setTimeout(()=>{ spellIdx++; setupSpellWord(); render(); }, 700);
  }else{
    playBuzz();
    spellBlanks = word.en.split('').map(ch=>({ch, source:'reveal'}));
    render();
    document.querySelectorAll('.spell-blank').forEach(el=> el.classList.add('reveal-wrong'));
    setTimeout(()=>{
      setupSpellWord();
      render();
    }, 3000);
  }
}

// ---------- 파이널테스트 ----------
let finalOrder = [], finalAnswers = {}, finalStatus = {}, finalPhase = 'input', finalHadWrongFirstPass = false;
function setupFinalRound(){
  finalOrder = shuffle(words.map(w=>w.id));
  finalAnswers = {}; finalStatus = {};
  finalOrder.forEach(id=>{ finalAnswers[id]=''; finalStatus[id]='unanswered'; });
  finalPhase = 'input';
  finalHadWrongFirstPass = false;
}
function normalizeAnswer(s){ return (s||'').trim().replace(/\s+/g,''); }
function checkMeaning(userInput, ko){
  const norm = normalizeAnswer(userInput);
  if(!norm) return false;
  const options = ko.split('/').map(s=>normalizeAnswer(s));
  return options.includes(norm);
}
function renderFinal(panel){
  if(words.length < 4){ panel.innerHTML = needMore('파이널테스트를 하려면 단어가 4개 이상 필요해요! 📝'); return; }
  if(finalOrder.length===0) setupFinalRound();

  let rowsHtml = '';
  finalOrder.forEach((id, i)=>{
    const w = words.find(x=>x.id===id);
    const status = finalStatus[id];
    const disabled = status==='correct' || status==='wrong-final';
    const cls = status==='correct' ? 'correct' : (status==='wrong-retry' || status==='wrong-final') ? 'wrong' : '';
    rowsHtml +=
      '<div class="ft-row">'+
        '<span class="ft-num">'+(i+1)+'.</span>'+
        '<span class="ft-en">'+escapeHtml(w.en)+'</span>'+
        '<span class="ft-spk"><button data-en="'+escapeAttr(w.en)+'" data-rate="0.95">🔊</button><button data-en="'+escapeAttr(w.en)+'" data-rate="0.6">🐢</button></span>'+
        '<input class="ft-input '+cls+'" data-id="'+id+'" placeholder="뜻을 써보세요" value="'+escapeAttr(finalAnswers[id])+'" '+(disabled?'disabled':'')+'/>'+
        (status==='wrong-final' ? '<div class="ft-answer">정답: '+escapeHtml(w.ko)+'</div>' : '')+
      '</div>';
  });

  const anyRetryPending = Object.values(finalStatus).some(s=>s==='wrong-retry');
  let resultHtml = '';
  if(finalPhase==='done'){
    const correctCount = Object.values(finalStatus).filter(s=>s==='correct').length;
    resultHtml = '<div class="ft-result">결과: '+correctCount+' / '+finalOrder.length+' 개 맞았어요!</div>'+
      '<button class="ft-retry-btn" id="ftRetryBtn">🔄 새 테스트 시작하기 (순서 랜덤)</button>';
  }

  panel.innerHTML =
    '<div class="ft-intro">단어를 듣고 뜻을 입력해보세요. 다 쓴 뒤 아래 버튼으로 확인해요.</div>'+
    rowsHtml+
    (finalPhase==='done' ? resultHtml : '<button class="ft-check-btn" id="ftCheckBtn">'+(finalPhase==='retry' ? '다시 확인하기' : '정답 확인하기')+'</button>')+
    '<div class="star-note">한 번에 다 맞히면(재도전 없이) ⭐3개 (처음 한 번만) / 이후엔 성공할 때마다 ⭐1개</div>';

  panel.querySelectorAll('.ft-spk button').forEach(b=>{
    b.addEventListener('click', ()=> speak(b.dataset.en, parseFloat(b.dataset.rate)));
  });
  panel.querySelectorAll('.ft-input').forEach(inp=>{
    inp.addEventListener('input', ()=>{ finalAnswers[inp.dataset.id] = inp.value; });
  });
  const checkBtn = panel.querySelector('#ftCheckBtn');
  if(checkBtn) checkBtn.addEventListener('click', checkFinalTest);
  const retryBtn = panel.querySelector('#ftRetryBtn');
  if(retryBtn) retryBtn.addEventListener('click', ()=>{ setupFinalRound(); render(); });
}
async function checkFinalTest(){
  let allCorrect = true;
  let anyWrongThisPass = false;
  finalOrder.forEach(id=>{
    const w = words.find(x=>x.id===id);
    const ok = checkMeaning(finalAnswers[id], w.ko);
    if(ok){
      finalStatus[id] = 'correct';
    }else{
      allCorrect = false;
      anyWrongThisPass = true;
      if(finalPhase==='input'){
        finalStatus[id] = 'wrong-retry';
      }else{
        finalStatus[id] = 'wrong-final';
      }
    }
  });
  if(finalPhase==='input'){
    if(anyWrongThisPass){ finalHadWrongFirstPass = true; finalPhase = 'retry'; playBuzz(); }
    else{ finalPhase='done'; playDing(); }
  }else if(finalPhase==='retry'){
    finalPhase = 'done';
    if(!anyWrongThisPass) playDing(); else playBuzz();
  }
  if(finalPhase==='done' && allCorrect && !finalHadWrongFirstPass){
    let earned = 3;
    if(reward.finalTestEverCompleted) earned = 1; else { reward.finalTestEverCompleted = true; }
    await grantStars(earned);
    await saveReward();
  }
  render();
}

// ---------- 보상 / 캐릭터 ----------
function renderReward(panel){
  const animalIdx = getAnimalIndex(reward.stars);
  const starsIn = getStarsIntoCurrentAnimal(reward.stars);
  const stage = getStageIndex(starsIn);
  const current = ANIMALS[animalIdx];
  const nameKnown = stage >= 1;
  const heroImg = current.images[stage];
  const nextThresh = (stage+1) * STARS_PER_STAGE;
  const prevThresh = stage * STARS_PER_STAGE;
  const pct = stage < STAGE_COUNT-1 ? Math.min(100, Math.round((starsIn-prevThresh)/(nextThresh-prevThresh)*100)) : 100;
  const isLastAnimal = animalIdx === ANIMALS.length-1;
  const fullyGrown = stage === STAGE_COUNT-1;

  panel.innerHTML =
    '<div class="char-hero" style="background:'+stageBgGradient(current, stage)+'; border-radius:20px;">'+
      '<img src="'+heroImg+'" class="hero-img" alt="캐릭터 이미지">'+
      '<div class="stage-name">'+(nameKnown ? current.name+' · ' : '')+STAGE_LABELS[stage]+'</div>'+
    '</div>'+
    '<div class="grow-note">🥚 알에서 시작해서 총 '+STAGE_COUNT+'단계를 거치면 멋진 어른이 돼요!</div>'+
    '<div class="star-bar-wrap">'+
      '<div class="star-count">⭐ 총 '+reward.stars+'개 모았어요</div>'+
      '<div class="star-bar-bg"><div class="star-bar-fill" style="width:'+pct+'%"></div></div>'+
      '<div class="star-next">'+(
        fullyGrown && isLastAnimal ? '와, 모든 캐릭터를 다 키웠어요! 🎉'
        : fullyGrown ? ((nameKnown?current.name:'이 친구')+'을(를) 다 키웠어요! 다음 친구가 곧 나타나요 🎉')
        : ('다음 단계까지 ⭐ '+(nextThresh-starsIn)+'개 남았어요 (한 단계에 ⭐'+STARS_PER_STAGE+'개 필요해요)')
      )+'</div>'+
    '</div>'+
    '<div class="roster-title">나의 캐릭터 도감 ('+Math.min(animalIdx + (fullyGrown?1:0), ANIMALS.length)+' / '+ANIMALS.length+')</div>'+
    '<div class="roster-grid" id="rosterGrid"></div>'+
    '<button class="newset-btn reset-star-btn" id="resetStarBtn">⭐ 별 초기화하기</button>';

  const grid = panel.querySelector('#rosterGrid');
  ANIMALS.forEach((a, i)=>{
    const card = document.createElement('div');
    if(i < animalIdx || (i===animalIdx && fullyGrown)){
      card.className = 'roster-card done';
      card.style.background = stageBgGradient(a, STAGE_COUNT-1);
      card.innerHTML = '<img src="'+a.images[STAGE_COUNT-1]+'" class="roster-img" alt=""><div class="roster-name">'+a.name+'</div><div class="roster-badge">완료 ✓</div>';
    }else if(i === animalIdx){
      card.className = 'roster-card current';
      card.innerHTML = '<img src="'+a.images[stage]+'" class="roster-img" alt=""><div class="roster-name">'+(nameKnown ? a.name : '???')+'</div><div class="roster-badge">'+STAGE_LABELS[stage]+'</div>';
    }else{
      card.className = 'roster-card locked';
      card.innerHTML = '<img src="'+a.images[0]+'" class="roster-img silhouette" alt=""><div class="roster-name">???</div><div class="roster-badge">잠김</div>';
    }
    grid.appendChild(card);
  });

  let confirmingStarReset = false;
  const resetBtn = panel.querySelector('#resetStarBtn');
  resetBtn.addEventListener('click', async ()=>{
    if(!confirmingStarReset){
      confirmingStarReset = true;
      resetBtn.textContent = '⚠️ 한 번 더 누르면 별과 캐릭터가 처음부터 다시 시작돼요';
      setTimeout(()=>{ confirmingStarReset=false; if(document.body.contains(resetBtn)) resetBtn.textContent = '⭐ 별 초기화하기'; }, 2500);
      return;
    }
    reward = { stars:0, spellItEverCompleted:false, finalTestEverCompleted:false };
    await saveReward();
    render();
  });
}

(async function init(){
  await loadAll();
  render();
})();
</script>
