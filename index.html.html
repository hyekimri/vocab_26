<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>단어친구 - 영단어 시험 준비</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

  :root{
    --sky-top:#CFF3FF; --sky-bottom:#FFFFFF;
    --coral:#FF7A5C; --coral-dark:#E85F42;
    --grass:#7FC96A; --grass-dark:#5FA84C;
    --yellow:#FFC93C; --yellow-dark:#E6AC1F;
    --purple:#9B72CF; --purple-dark:#7E56B3;
    --navy:#2B3A55; --muted:#8b97ab; --white:#FFFFFF;
    --line:#E4ECF5;
    --shadow: 0 6px 0 rgba(43,58,85,0.12);
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:'Noto Sans KR', sans-serif; color:var(--navy);
    background:linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 45%);
    min-height:100vh; padding-bottom:90px;
  }
  header{text-align:center; padding:22px 16px 6px;}
  header h1{font-family:'Gaegu',cursive; font-size:32px; margin:0;}
  header p{margin:4px 0 0; font-size:13px; color:var(--muted);}

  .status-bar{
    max-width:640px; margin:10px auto 0; padding:0 16px;
    display:flex; align-items:center; justify-content:center; gap:10px;
    font-family:'Gaegu',cursive; font-size:17px;
  }
  .status-chip{
    background:var(--white); border-radius:14px; padding:6px 14px;
    box-shadow:var(--shadow); display:flex; align-items:center; gap:6px; cursor:pointer;
  }

  .tabs{display:flex; justify-content:center; gap:6px; flex-wrap:wrap; padding:14px 10px 4px;}
  .tab-btn{
    font-family:'Gaegu',cursive; font-size:16px; font-weight:700; border:none; border-radius:14px;
    padding:9px 14px; cursor:pointer; background:var(--white); color:var(--navy); box-shadow:var(--shadow);
  }
  .tab-btn.active{background:var(--coral); color:var(--white); box-shadow:0 6px 0 var(--coral-dark);}

  main{max-width:640px; margin:0 auto; padding:14px 16px;}
  .panel{background:var(--white); border-radius:22px; padding:20px; box-shadow:var(--shadow); min-height:320px;}

  /* 단어 입력 */
  .set-counter{
    text-align:center; font-family:'Gaegu',cursive; font-size:18px; margin-bottom:12px; color:var(--purple-dark);
  }
  .add-form{display:flex; flex-direction:column; gap:8px; margin-bottom:16px; padding:14px; background:#F7FAFD; border-radius:16px;}
  .add-row{display:flex; gap:8px; flex-wrap:wrap;}
  .add-form input, .add-form textarea{
    flex:1; min-width:110px; font-family:'Noto Sans KR'; font-size:15px; padding:10px 12px;
    border:2px solid var(--line); border-radius:12px; outline:none; resize:none;
  }
  .add-form input:focus, .add-form textarea:focus{border-color:var(--coral);}
  .add-form button{
    font-family:'Gaegu',cursive; font-size:17px; font-weight:700; background:var(--grass); color:var(--white);
    border:none; border-radius:12px; padding:0 18px; box-shadow:0 4px 0 var(--grass-dark); cursor:pointer; align-self:flex-start;
  }
  .add-form button:disabled{background:#C9D3E0; box-shadow:none; cursor:not-allowed;}
  .hint-small{font-size:12px; color:var(--muted);}

  .word-list{list-style:none; margin:0; padding:0;}
  .word-row{display:flex; align-items:center; gap:8px; padding:10px 6px; border-bottom:1px dashed var(--line);}
  .word-row .en{font-weight:700; min-width:80px;}
  .word-row .ko{color:var(--muted); flex:1;}
  .spk-btn{
    background:var(--purple); color:var(--white); border:none; border-radius:10px; width:30px; height:30px;
    cursor:pointer; font-size:14px; flex-shrink:0;
  }
  .del-btn{background:none; border:none; color:#C7C7C7; cursor:pointer; font-size:16px;}
  .del-btn:hover{color:var(--coral);}
  .newset-btn{
    margin-top:14px; width:100%; font-family:'Gaegu',cursive; font-size:16px; font-weight:700;
    background:var(--yellow); color:var(--navy); border:none; border-radius:12px; padding:12px; box-shadow:0 4px 0 var(--yellow-dark); cursor:pointer;
  }
  .empty-msg, .need-more{text-align:center; color:var(--muted); padding:40px 10px; font-family:'Gaegu',cursive; font-size:18px; line-height:1.6;}

  /* 플래시카드 */
  .flash-wrap{display:flex; flex-direction:column; align-items:center; gap:14px;}
  .flash-card{width:100%; max-width:320px; height:190px; perspective:1000px; cursor:pointer;}
  .flash-inner{position:relative; width:100%; height:100%; transition:transform .5s; transform-style:preserve-3d;}
  .flash-card.flipped .flash-inner{transform:rotateY(180deg);}
  .flash-face{
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    border-radius:20px; backface-visibility:hidden; font-family:'Gaegu',cursive; font-size:30px; font-weight:700; text-align:center; padding:10px; gap:6px;
  }
  .flash-front{background:linear-gradient(160deg,#FFE9DE,var(--coral)); color:var(--white);}
  .flash-back{background:linear-gradient(160deg,#EFE3FA,var(--purple)); color:var(--white); transform:rotateY(180deg);}
  .flash-example{font-family:'Noto Sans KR'; font-size:13px; font-weight:400; opacity:.9; padding:0 8px;}
  .flash-hint{font-size:12px; color:var(--muted);}
  .flash-actions{display:flex; gap:10px;}
  .know-btn, .dontknow-btn{
    font-family:'Gaegu',cursive; font-size:17px; font-weight:700; border:none; border-radius:14px; padding:11px 18px; cursor:pointer; color:var(--white);
  }
  .know-btn{background:var(--grass); box-shadow:0 4px 0 var(--grass-dark);}
  .dontknow-btn{background:#B8C2D1; box-shadow:0 4px 0 #96A2B5;}
  .sound-row{display:flex; gap:8px;}
  .sound-btn{
    background:var(--white); border:2px solid var(--line); border-radius:12px; padding:7px 12px; font-size:13px; cursor:pointer; color:var(--navy);
  }
  .progress-text{font-size:13px; color:var(--muted);}
  .example-box{
    margin-top:12px; padding:10px 12px; background:#F7FAFD; border-radius:12px; display:flex; align-items:center; gap:8px; font-size:14px; max-width:320px;
  }

  /* 퀴즈 */
  .quiz-word-row{display:flex; align-items:center; justify-content:center; gap:10px; margin:6px 0 6px;}
  .quiz-word{font-family:'Gaegu',cursive; font-size:30px; font-weight:700;}
  .quiz-example{text-align:center; font-size:13px; color:var(--muted); margin-bottom:16px;}
  .quiz-options{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .quiz-opt{
    font-family:'Noto Sans KR'; font-size:16px; font-weight:500; border:2px solid var(--line); border-radius:14px;
    background:var(--white); padding:14px 8px; cursor:pointer;
  }
  .quiz-opt.correct{background:var(--grass); border-color:var(--grass-dark); color:var(--white);}
  .quiz-opt.wrong{background:var(--coral); border-color:var(--coral-dark); color:var(--white);}
  .quiz-score{text-align:center; color:var(--muted); font-size:13px; margin-bottom:4px;}

  /* 매칭게임 */
  .match-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:8px;}
  .match-card{
    aspect-ratio:1/1; display:flex; align-items:center; justify-content:center; text-align:center; border-radius:12px;
    font-weight:700; font-size:13px; padding:4px; background:#EFF4FA; border:2px solid var(--line); cursor:pointer; color:var(--navy);
  }
  .match-card.selected{border-color:var(--purple); background:#EFE3FA;}
  .match-card.matched{background:var(--grass); border-color:var(--grass-dark); color:var(--white); cursor:default;}
  .match-card.shake{background:var(--coral); border-color:var(--coral-dark); color:var(--white);}

  /* 보상 */
  .char-hero{
    text-align:center; padding:26px 10px 18px; border-radius:20px;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.4);
    position:relative; overflow:hidden;
  }
  .char-hero .hero-emoji{font-size:76px; display:block; filter:drop-shadow(0 6px 10px rgba(43,58,85,0.25)); animation:bob 2.6s ease-in-out infinite;}
  @keyframes bob{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }
  .stage-sparkles{font-size:15px; letter-spacing:3px; margin-top:2px; min-height:18px;}
  .char-hero .stage-name{font-family:'Gaegu',cursive; font-size:20px; margin-top:2px; color:var(--navy); background:rgba(255,255,255,.75); display:inline-block; padding:3px 14px; border-radius:20px;}
  .star-bar-wrap{max-width:320px; margin:16px auto 6px; }
  .star-count{text-align:center; font-family:'Gaegu',cursive; font-size:16px; margin-bottom:6px;}
  .star-bar-bg{background:var(--line); border-radius:20px; height:16px; overflow:hidden;}
  .star-bar-fill{background:linear-gradient(90deg,var(--yellow),#FFA53C); height:100%; border-radius:20px; transition:width .4s;}
  .star-next{text-align:center; font-size:12px; color:var(--muted); margin-top:6px;}

  .roster-title{font-family:'Gaegu',cursive; font-size:16px; margin:20px 2px 10px; color:var(--navy);}
  .roster-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px;}
  .roster-card{
    border-radius:14px; padding:10px 6px; text-align:center; border:2px solid var(--line); background:var(--white);
  }
  .roster-card .roster-emoji{font-size:26px;}
  .roster-card .roster-name{font-family:'Gaegu',cursive; font-size:12.5px; margin-top:3px; line-height:1.2;}
  .roster-card .roster-badge{font-size:10px; color:var(--muted); margin-top:2px;}
  .roster-card.done{color:var(--white); border-color:transparent;}
  .roster-card.done .roster-badge{color:rgba(255,255,255,.85);}
  .roster-card.current{border-color:var(--purple); background:#F5EFFC; box-shadow:0 0 0 3px rgba(155,114,207,.15);}
  .roster-card.next{background:#F2F4F7;}
  .roster-card.next .roster-emoji.silhouette{filter:brightness(0) opacity(0.4);}
  .roster-card.locked{background:#F2F4F7; opacity:.75;}
  .roster-card .mystery-mark{font-size:22px; font-weight:900; color:#B8C2D1; font-family:'Gaegu',cursive;}
</style>
</head>
<body>

<header>
  <h1>🎧 단어친구</h1>
  <p>이번 학원 단어 8개, 재미있게 외워봐요</p>
</header>

<div class="status-bar">
  <div class="status-chip" id="statusChip"></div>
</div>

<div class="tabs">
  <button class="tab-btn active" data-tab="list">✏️ 단어 입력</button>
  <button class="tab-btn" data-tab="flash">🃏 플래시카드</button>
  <button class="tab-btn" data-tab="quiz">❓ 퀴즈</button>
  <button class="tab-btn" data-tab="match">🧩 매칭게임</button>
  <button class="tab-btn" data-tab="reward">🐉 캐릭터 키우기</button>
</div>

<main><div class="panel" id="panel"></div></main>
<p style="max-width:640px;margin:14px auto 0;padding:0 20px;text-align:center;font-size:11px;color:var(--muted);">
  입력한 단어와 진행 상황은 이 기기의 브라우저에 저장돼요. 다른 기기에서는 보이지 않으니, 아이가 주로 쓰는 폰/패드에서 여세요.
  발음 기능은 기기의 음성 기능을 사용해요 (아이폰 Safari는 소리 버튼을 먼저 한 번 눌러주세요).
</p>

<script>
const WORDS_KEY = 'voca-buddy-words-v1';
const REWARD_KEY = 'voca-buddy-reward-v2';
const MAX_WORDS = 8;

let words = [];
let reward = { stars:0 };
let activeTab = 'list';

// 순서대로 잠금 해제되는 캐릭터 목록. 새 동물을 추가하고 싶으면 이 배열 끝에 객체만 더 넣으면 돼요.
const ANIMALS = [
  { id:'dragon',       name:'드래곤',        emoji:'🐉', from:'#FFD3C2', to:'#FF7A5C' },
  { id:'dolphin',      name:'돌고래',        emoji:'🐬', from:'#CFF3FF', to:'#2F9BD6' },
  { id:'flyingsquirrel', name:'하늘다람쥐',  emoji:'🐿️', from:'#E8DFFF', to:'#8C6FE0' },
  { id:'unicorn',      name:'유니콘',        emoji:'🦄', from:'#FFE3F3', to:'#E074C2' },
  { id:'axolotl',      name:'우파루파',      emoji:'🦎', from:'#FFE0EC', to:'#FF8FB8' },
  { id:'gecko',        name:'크레스티드게코', emoji:'🦎', from:'#E4F7DE', to:'#5FA84C' },
  { id:'goldenmonkey', name:'황금 원숭이',   emoji:'🐒', from:'#FFF3C4', to:'#E6AC1F' },
  { id:'marten',       name:'담비',          emoji:'🦡', from:'#EFE6DC', to:'#8A6A4B' },
  { id:'whitetiger',   name:'백호',          emoji:'🐯', from:'#F1F5FF', to:'#6E86B8' },
  { id:'redpanda',     name:'렛서판다',      emoji:'🦝', from:'#FFE7DA', to:'#C1622A' }
];
const STAGE_LABELS = ['알', '아기', '성장 중', '다 자람'];
const STAGE_THRESH = [0, 3, 7, 12];       // 한 캐릭터 안에서 단계가 바뀌는 별 개수
const STARS_PER_ANIMAL = STAGE_THRESH[STAGE_THRESH.length-1]; // 캐릭터 한 마리를 다 키우는 데 필요한 별

// ---------- storage (localStorage: data stays on this device/browser) ----------
async function loadAll(){
  try{ const raw = localStorage.getItem(WORDS_KEY); words = raw ? JSON.parse(raw) : []; }catch(e){ words = []; }
  try{ const raw = localStorage.getItem(REWARD_KEY); reward = raw ? JSON.parse(raw) : {stars:0}; }catch(e){ reward = {stars:0}; }
}
async function saveWords(){ try{ localStorage.setItem(WORDS_KEY, JSON.stringify(words)); }catch(e){ console.error(e); } }
async function saveReward(){ try{ localStorage.setItem(REWARD_KEY, JSON.stringify(reward)); }catch(e){ console.error(e); } }

function uid(){ return 'w' + Date.now() + Math.floor(Math.random()*1000); }

// ---------- speech ----------
function speak(text, rate){
  if(!text || !('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = rate || 0.95;
  window.speechSynthesis.speak(u);
}

// ---------- 진행 상황 계산 ----------
function getAnimalIndex(stars){
  return Math.min(ANIMALS.length-1, Math.floor(stars / STARS_PER_ANIMAL));
}
function getStarsIntoCurrentAnimal(stars){
  const idx = getAnimalIndex(stars);
  const used = idx * STARS_PER_ANIMAL;
  return Math.min(STARS_PER_ANIMAL, stars - used);
}
function getStageIndex(starsIntoAnimal){
  let idx = 0;
  for(let i=0;i<STAGE_THRESH.length;i++){ if(starsIntoAnimal>=STAGE_THRESH[i]) idx = i; }
  return idx;
}
async function addStar(){
  reward.stars += 1;
  await saveReward();
  renderStatusChip();
}
function renderStatusChip(){
  const chip = document.getElementById('statusChip');
  const animalIdx = getAnimalIndex(reward.stars);
  const starsIn = getStarsIntoCurrentAnimal(reward.stars);
  const stage = getStageIndex(starsIn);
  const emoji = stage===0 ? '🥚' : ANIMALS[animalIdx].emoji;
  chip.innerHTML = `${emoji} <span>⭐ ${reward.stars}</span>`;
  chip.onclick = ()=>{ document.querySelector('.tab-btn[data-tab="reward"]').click(); };
}

// ---------- tabs ----------
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeTab = btn.dataset.tab;
    render();
  });
});

function render(){
  const panel = document.getElementById('panel');
  panel.innerHTML = '';
  if(activeTab==='list') renderList(panel);
  if(activeTab==='flash') renderFlash(panel);
  if(activeTab==='quiz') renderQuiz(panel);
  if(activeTab==='match') renderMatch(panel);
  if(activeTab==='reward') renderReward(panel);
  renderStatusChip();
}

// ---------- 단어 입력 ----------
function renderList(panel){
  const full = words.length >= MAX_WORDS;
  panel.innerHTML = `
    <div class="set-counter">이번 세트 ${words.length} / ${MAX_WORDS}개</div>
    <div class="add-form">
      <div class="add-row">
        <input id="enInput" placeholder="영어 단어 (예: elephant)" ${full?'disabled':''}/>
        <input id="koInput" placeholder="뜻 (예: 코끼리)" ${full?'disabled':''}/>
      </div>
      <textarea id="exInput" rows="2" placeholder="예문 (선택 사항, 비워도 돼요. 예: I saw an elephant at the zoo.)" ${full?'disabled':''}></textarea>
      <button id="addBtn" ${full?'disabled':''}>단어 추가</button>
      <div class="hint-small">${full ? '이번 세트가 다 찼어요! 학원 다녀온 뒤 새 단어로 다시 채워보세요.' : '학원에서 배운 단어를 하나씩 입력해요 (최대 8개)'}</div>
    </div>
    <ul class="word-list" id="wordListEl"></ul>
    <button class="newset-btn" id="newSetBtn">🔄 이번 세트 지우고 새로 시작하기</button>
  `;
  const listEl = panel.querySelector('#wordListEl');
  if(words.length===0){
    listEl.innerHTML = `<li class="empty-msg">아직 등록된 단어가 없어요 ✏️<br>위에서 첫 단어를 추가해보세요!</li>`;
  }else{
    words.forEach(w=>{
      const li = document.createElement('li');
      li.className = 'word-row';
      li.innerHTML = `
        <button class="spk-btn" data-en="${escapeAttr(w.en)}">🔊</button>
        <span class="en">${escapeHtml(w.en)}</span>
        <span class="ko">${escapeHtml(w.ko)}</span>
        <button class="del-btn" data-id="${w.id}">✕</button>
      `;
      listEl.appendChild(li);
    });
  }
  panel.querySelector('#addBtn').addEventListener('click', addWord);
  panel.querySelector('#exInput').addEventListener('keydown', e=>{ if(e.key==='Enter' && e.ctrlKey) addWord(); });
  panel.querySelectorAll('.spk-btn').forEach(b=> b.addEventListener('click', ()=> speak(b.dataset.en)));
  panel.querySelectorAll('.del-btn').forEach(b=>{
    b.addEventListener('click', async ()=>{
      words = words.filter(w=>w.id!==b.dataset.id);
      await saveWords();
      render();
    });
  });
  let confirmingReset = false;
  const newSetBtn = panel.querySelector('#newSetBtn');
  newSetBtn.addEventListener('click', async ()=>{
    if(!confirmingReset){
      confirmingReset = true;
      newSetBtn.textContent = '⚠️ 한 번 더 누르면 정말 초기화돼요';
      setTimeout(()=>{ confirmingReset=false; if(document.body.contains(newSetBtn)) newSetBtn.textContent = '🔄 이번 세트 지우고 새로 시작하기'; }, 2500);
      return;
    }
    words = [];
    await saveWords();
    render();
  });
}

async function addWord(){
  if(words.length >= MAX_WORDS) return;
  const en = document.getElementById('enInput').value.trim();
  const ko = document.getElementById('koInput').value.trim();
  const ex = document.getElementById('exInput').value.trim();
  if(!en || !ko) return;
  words.push({id:uid(), en, ko, ex, mastery:0});
  await saveWords();
  render();
  document.getElementById('enInput').focus();
}

function escapeHtml(s){ return s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s){ return escapeHtml(s).replace(/"/g,'&quot;'); }

// ---------- 플래시카드 ----------
let flashIdx = 0, flashOrder = [];
function renderFlash(panel){
  if(words.length===0){ panel.innerHTML = needMore('플래시카드를 하려면 먼저 단어를 입력해주세요! 🃏'); return; }
  if(flashOrder.length===0 || flashIdx>=flashOrder.length){ flashOrder = shuffle(words.map(w=>w.id)); flashIdx=0; }
  const word = words.find(w=>w.id===flashOrder[flashIdx]);
  panel.innerHTML = `
    <div class="flash-wrap">
      <div class="progress-text">${flashIdx+1} / ${flashOrder.length}</div>
      <div class="flash-card" id="flashCard">
        <div class="flash-inner">
          <div class="flash-face flash-front">${escapeHtml(word.en)}</div>
          <div class="flash-face flash-back">
            <div>${escapeHtml(word.ko)}</div>
            ${word.ex ? `<div class="flash-example">${escapeHtml(word.ex)}</div>` : ''}
          </div>
        </div>
      </div>
      <div class="flash-hint">카드를 눌러서 뜻을 확인하세요</div>
      <div class="sound-row">
        <button class="sound-btn" id="spkNormal">🔊 발음</button>
        <button class="sound-btn" id="spkSlow">🐢 천천히</button>
        ${word.ex ? '<button class="sound-btn" id="spkEx">📖 예문 듣기</button>' : ''}
      </div>
      <div class="flash-actions">
        <button class="dontknow-btn" id="dontKnowBtn">🙁 몰라요</button>
        <button class="know-btn" id="knowBtn">🙂 알아요</button>
      </div>
    </div>
  `;
  const card = panel.querySelector('#flashCard');
  card.addEventListener('click', ()=> card.classList.toggle('flipped'));
  panel.querySelector('#spkNormal').addEventListener('click', e=>{ e.stopPropagation(); speak(word.en, 0.95); });
  panel.querySelector('#spkSlow').addEventListener('click', e=>{ e.stopPropagation(); speak(word.en, 0.6); });
  const exBtn = panel.querySelector('#spkEx');
  if(exBtn) exBtn.addEventListener('click', e=>{ e.stopPropagation(); speak(word.ex, 0.9); });
  panel.querySelector('#knowBtn').addEventListener('click', e=>{ e.stopPropagation(); flashAnswer(word, true); });
  panel.querySelector('#dontKnowBtn').addEventListener('click', e=>{ e.stopPropagation(); flashAnswer(word, false); });
}
async function flashAnswer(word, knew){
  if(knew){ word.mastery = Math.min(3, word.mastery+1); await addStar(); }
  else{ word.mastery = Math.max(0, word.mastery-1); }
  await saveWords();
  flashIdx++;
  render();
}

// ---------- 퀴즈 ----------
let quizWordId = null, quizAnswered = false, quizScore = {correct:0, total:0};
function renderQuiz(panel){
  if(words.length < 4){ panel.innerHTML = needMore('퀴즈를 하려면 단어가 4개 이상 필요해요! ❓'); return; }
  if(!quizWordId || !words.find(w=>w.id===quizWordId)) pickQuizWord();
  const word = words.find(w=>w.id===quizWordId);
  const options = buildQuizOptions(word);
  panel.innerHTML = `
    <div class="quiz-score">맞은 개수: ${quizScore.correct} / ${quizScore.total}</div>
    <div class="quiz-word-row">
      <div class="quiz-word">${escapeHtml(word.en)}</div>
      <button class="spk-btn" id="quizSpk">🔊</button>
    </div>
    ${word.ex ? `<div class="quiz-example">${escapeHtml(word.ex)}</div>` : ''}
    <div class="quiz-options" id="quizOptions">
      ${options.map(o=>`<button class="quiz-opt" data-ko="${escapeAttr(o)}">${escapeHtml(o)}</button>`).join('')}
    </div>
  `;
  panel.querySelector('#quizSpk').addEventListener('click', ()=> speak(word.en));
  panel.querySelectorAll('.quiz-opt').forEach(btn=> btn.addEventListener('click', ()=> quizAnswer(btn, word)));
}
function pickQuizWord(){ const pool = words.map(w=>w.id); quizWordId = pool[Math.floor(Math.random()*pool.length)]; quizAnswered=false; }
function buildQuizOptions(word){
  const others = words.filter(w=>w.id!==word.id).map(w=>w.ko);
  const distractors = shuffle(others).slice(0,3);
  return shuffle([word.ko, ...distractors]);
}
async function quizAnswer(btn, word){
  if(quizAnswered) return;
  quizAnswered = true;
  const isCorrect = btn.dataset.ko === word.ko;
  quizScore.total++;
  if(isCorrect){ quizScore.correct++; word.mastery = Math.min(3, word.mastery+1); await addStar(); }
  else{ word.mastery = Math.max(0, word.mastery-1); }
  await saveWords();
  document.querySelectorAll('.quiz-opt').forEach(b=>{
    if(b.dataset.ko===word.ko) b.classList.add('correct');
    else if(b===btn) b.classList.add('wrong');
    b.disabled = true;
  });
  setTimeout(()=>{ pickQuizWord(); render(); }, 800);
}

// ---------- 매칭게임 ----------
let matchCards = [], matchSelected = [], matchLock = false;
function renderMatch(panel){
  if(words.length < 3){ panel.innerHTML = needMore('매칭게임을 하려면 단어가 3개 이상 필요해요! 🧩'); return; }
  if(matchCards.length===0) setupMatchGame();
  panel.innerHTML = `<div class="match-grid" id="matchGrid"></div>`;
  const grid = panel.querySelector('#matchGrid');
  matchCards.forEach((c, idx)=>{
    const el = document.createElement('div');
    el.className = 'match-card' + (c.matched ? ' matched' : '');
    el.textContent = c.text;
    if(!c.matched) el.addEventListener('click', ()=> matchClick(idx));
    grid.appendChild(el);
  });
}
function setupMatchGame(){
  const chosen = shuffle(words.slice());
  const cards = [];
  chosen.forEach(w=>{ cards.push({wordId:w.id, text:w.en, matched:false}); cards.push({wordId:w.id, text:w.ko, matched:false}); });
  matchCards = shuffle(cards); matchSelected = []; matchLock = false;
}
function matchClick(idx){
  if(matchLock) return;
  const card = matchCards[idx];
  if(card.matched || matchSelected.includes(idx)) return;
  matchSelected.push(idx);
  const els = document.querySelectorAll('.match-card');
  els[idx].classList.add('selected');
  if(matchSelected.length===2){
    matchLock = true;
    const [i1,i2] = matchSelected;
    const c1 = matchCards[i1], c2 = matchCards[i2];
    if(c1.wordId===c2.wordId){
      setTimeout(async ()=>{
        c1.matched=true; c2.matched=true;
        const w = words.find(w=>w.id===c1.wordId);
        if(w) w.mastery = Math.min(3, w.mastery+1);
        await saveWords();
        await addStar();
        matchSelected = []; matchLock = false;
        const allMatched = matchCards.every(c=>c.matched);
        render();
        if(allMatched) setTimeout(()=>{ matchCards=[]; render(); }, 700);
      }, 350);
    }else{
      els[i1].classList.add('shake'); els[i2].classList.add('shake');
      setTimeout(()=>{
        els[i1].classList.remove('selected','shake'); els[i2].classList.remove('selected','shake');
        matchSelected = []; matchLock = false;
      }, 600);
    }
  }
}

// ---------- 보상 / 캐릭터 ----------
function renderReward(panel){
  const animalIdx = getAnimalIndex(reward.stars);
  const starsIn = getStarsIntoCurrentAnimal(reward.stars);
  const stage = getStageIndex(starsIn);
  const current = ANIMALS[animalIdx];
  const heroEmoji = stage===0 ? '🥚' : current.emoji;
  const nextThresh = STAGE_THRESH[stage+1];
  const prevThresh = STAGE_THRESH[stage];
  const pct = nextThresh ? Math.min(100, Math.round((starsIn-prevThresh)/(nextThresh-prevThresh)*100)) : 100;
  const isLastAnimal = animalIdx === ANIMALS.length-1;
  const fullyGrown = stage === STAGE_THRESH.length-1;

  panel.innerHTML = `
    <div class="char-hero" style="background:linear-gradient(160deg, ${current.from}, ${current.to});">
      <span class="hero-emoji">${heroEmoji}</span>
      <div class="stage-sparkles">${'✨'.repeat(stage)}</div>
      <div class="stage-name">${current.name} · ${STAGE_LABELS[stage]}</div>
    </div>
    <div class="star-bar-wrap">
      <div class="star-count">⭐ 총 ${reward.stars}개 모았어요</div>
      <div class="star-bar-bg"><div class="star-bar-fill" style="width:${pct}%"></div></div>
      <div class="star-next">${
        fullyGrown && isLastAnimal ? '와, 모든 캐릭터를 다 키웠어요! 🎉'
        : fullyGrown ? `${current.name}을(를) 다 키웠어요! 다음 친구가 곧 나타나요 🎉`
        : `다음 단계까지 ⭐ ${nextThresh-starsIn}개 남았어요`
      }</div>
    </div>
    <div class="roster-title">나의 캐릭터 도감 (${Math.min(animalIdx + (fullyGrown?1:0), ANIMALS.length)} / ${ANIMALS.length})</div>
    <div class="roster-grid" id="rosterGrid"></div>
  `;

  const grid = panel.querySelector('#rosterGrid');
  ANIMALS.forEach((a, i)=>{
    const card = document.createElement('div');
    if(i < animalIdx || (i===animalIdx && fullyGrown)){
      // 완료된 캐릭터
      card.className = 'roster-card done';
      card.style.background = `linear-gradient(160deg, ${a.from}, ${a.to})`;
      card.innerHTML = `<div class="roster-emoji">${a.emoji}</div><div class="roster-name">${a.name}</div><div class="roster-badge">완료 ✓</div>`;
    }else if(i === animalIdx){
      // 지금 키우는 중
      card.className = 'roster-card current';
      card.innerHTML = `<div class="roster-emoji">${stage===0?'🥚':a.emoji}</div><div class="roster-name">${a.name}</div><div class="roster-badge">${STAGE_LABELS[stage]}</div>`;
    }else if(i === animalIdx+1){
      // 바로 다음: 이름은 공개, 모습은 실루엣
      card.className = 'roster-card next';
      card.innerHTML = `<div class="roster-emoji silhouette">${a.emoji}</div><div class="roster-name">${a.name}</div><div class="roster-badge">다음 친구</div>`;
    }else{
      // 그 이후: 완전 미공개
      card.className = 'roster-card locked';
      card.innerHTML = `<div class="roster-emoji mystery-mark">?</div><div class="roster-name">???</div><div class="roster-badge">잠김</div>`;
    }
    grid.appendChild(card);
  });
}

// ---------- utils ----------
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function needMore(msg){ return `<div class="need-more">${msg}</div>`; }

(async function init(){
  await loadAll();
  render();
})();
</script>
